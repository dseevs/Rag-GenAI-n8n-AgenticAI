# VirtuLab Phase 1 infrastructure — ports chosen to avoid common conflicts:
#   Postgres 5434 (not 5432/5433), Redis 6380 (not 6379), Kafka 9095 (not 9092)
#   Kong proxy 8800 (not 8000), Kong admin 8801

services:
  virtulab-postgres:
    image: pgvector/pgvector:pg16
    container_name: virtulab-postgres
    environment:
      POSTGRES_DB: virtulab
      POSTGRES_USER: virtulab
      POSTGRES_PASSWORD: virtulab
    ports:
      - "5434:5432"
    volumes:
      - virtulab_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U virtulab -d virtulab"]
      interval: 5s
      timeout: 5s
      retries: 10

  virtulab-redis:
    image: redis:7-alpine
    container_name: virtulab-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  virtulab-redpanda:
    image: redpandadata/redpanda:v24.2.4
    container_name: virtulab-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:9095
      - --advertise-kafka-addr
      - internal://virtulab-redpanda:9092,external://localhost:9095
    ports:
      - "9095:9095"
    healthcheck:
      test: ["CMD-SHELL", "rpk topic list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  virtulab-kong:
    image: kong:3.8
    container_name: virtulab-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8800:8000"
      - "8801:8001"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      virtulab-postgres:
        condition: service_healthy
      virtulab-redis:
        condition: service_healthy

  virtulab-keycloak:
    image: quay.io/keycloak/keycloak:26.2.0
    container_name: virtulab-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "9080:8080"
    volumes:
      - ./keycloak/realm-virtulab.json:/opt/keycloak/data/import/realm-virtulab.json:ro
    depends_on:
      virtulab-postgres:
        condition: service_healthy

volumes:
  virtulab_pg_data:
