# VirtuLab Phase 3 — scrape Spring Boot Actuator /actuator/prometheus on host JARs
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels:
          service: auth-service

  - job_name: session-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]
        labels:
          service: session-service

  - job_name: lab-events-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8083"]
        labels:
          service: lab-events-service

  - job_name: graphql-gateway-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8097"]
        labels:
          service: graphql-gateway-service

  - job_name: ai-tutor-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8084"]
        labels:
          service: ai-tutor-service

  - job_name: agent-orchestrator-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8085"]
        labels:
          service: agent-orchestrator-service

  - job_name: rag-ingest-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8086"]
        labels:
          service: rag-ingest-service

  - job_name: analytics-ingest-service
    metrics_path: /actuator/prometheus
