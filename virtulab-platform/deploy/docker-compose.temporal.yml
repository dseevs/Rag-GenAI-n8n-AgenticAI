# Temporal (optional) — durable workflows for long-running jobs
#
# UI: http://localhost:8233
# gRPC: localhost:7233
services:
  virtulab-temporal:
    image: temporalio/auto-setup:1.25.2
    container_name: virtulab-temporal
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: virtulab
      POSTGRES_PWD: virtulab
      POSTGRES_SEEDS: virtulab-postgres
    ports:
      - "7233:7233"
    depends_on:
      virtulab-postgres:
        condition: service_healthy

  virtulab-temporal-ui:
    image: temporalio/ui:2.35.0
    container_name: virtulab-temporal-ui
    environment:
      TEMPORAL_ADDRESS: virtulab-temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8233:8080"
    depends_on:
      - virtulab-temporal

