server:
  port: 8084

spring:
  application:
    name: ai-tutor-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:9080/realms/virtulab}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:virtulab}
    username: ${DB_USER:virtulab}
    password: ${DB_PASSWORD:virtulab}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9095}

virtulab:
  ai:
    embedding-dimensions: 768
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embed-model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}
      chat-model: ${OLLAMA_CHAT_MODEL:llama3.2}
  kafka:
    topic:
      ai: lab.ai.v1

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}

resilience4j:
  circuitbreaker:
    instances:
      ollama:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
