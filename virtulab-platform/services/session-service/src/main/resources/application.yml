server:
  port: 8082

spring:
  application:
    name: session-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:9080/realms/virtulab}
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:virtulab}?schema=session
    username: ${DB_USER:virtulab}
    password: ${DB_PASSWORD:virtulab}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}

virtulab:
  jwt:
    secret: ${JWT_SECRET:virtulab-dev-secret-change-me-32chars-minimum!!}
  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:virtulab}
    user: ${DB_USER:virtulab}
    password: ${DB_PASSWORD:virtulab}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.virtulab: INFO
