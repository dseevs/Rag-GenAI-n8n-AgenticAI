server:
  port: 8095

spring:
  application:
    name: ml-scoring-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:9080/realms/virtulab}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:virtulab}
    username: ${DB_USER:virtulab}
    password: ${DB_PASSWORD:virtulab}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9095}
    consumer:
      group-id: ml-scoring
      auto-offset-reset: earliest

virtulab:
  kafka:
    topics:
      progress: lab.progress.v1
  ml:
    model-version: v1-logistic-heuristic
    score-threshold: 0.5
  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:virtulab}
    user: ${DB_USER:virtulab}
    password: ${DB_PASSWORD:virtulab}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
