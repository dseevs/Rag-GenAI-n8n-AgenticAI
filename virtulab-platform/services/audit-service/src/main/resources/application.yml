server:
  port: 8096

spring:
  application:
    name: audit-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:virtulab}
    username: ${DB_USER:virtulab}
    password: ${DB_PASSWORD:virtulab}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9095}
    consumer:
      group-id: audit-service
      auto-offset-reset: earliest

virtulab:
  kafka:
    topics:
      progress: lab.progress.v1
      ai: lab.ai.v1
  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:virtulab}
    user: ${DB_USER:virtulab}
    password: ${DB_PASSWORD:virtulab}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
